<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon (hive cell) -->
  <polygon points="100,10 178,55 178,145 100,190 22,145 22,55"
    fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="3"/>
  <!-- Inner hexagon -->
  <polygon points="100,40 150,67 150,133 100,160 50,133 50,67"
    fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="6 4"/>
  <!-- Agent dots -->
  <circle cx="75" cy="90" r="12" fill="#7C3AED" opacity="0.9"/>
  <text x="75" y="94" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="system-ui">C</text>
  <circle cx="125" cy="90" r="12" fill="#059669" opacity="0.9"/>
  <text x="125" y="94" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="system-ui">G</text>
  <circle cx="100" cy="130" r="12" fill="#2563EB" opacity="0.9"/>
  <text x="100" y="134" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="system-ui">X</text>
  <!-- Connection lines -->
  <line x1="85" y1="95" x2="115" y2="95" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="100" x2="95" y2="122" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
  <line x1="120" y1="100" x2="105" y2="122" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
</svg>
